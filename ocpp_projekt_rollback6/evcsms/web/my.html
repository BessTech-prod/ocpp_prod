<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <title>TakoramaCharge - Min statistik</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <div class="container-fluid">
      <a id="navDashboard" href="javascript:void(0)" class="navbar-brand d-flex align-items-center">
        <img src="/assets/logo.png" srcset="/assets/logo.png 2x" class="brand-logo" alt="TakoramaCharge">
        <span class="brand-text ms-2">Min Statistik</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse justify-content-end" id="navMain">
        <ul class="navbar-nav align-items-center gap-2">
          <li class="nav-item"><a id="navDashboard" class="nav-link" href="javascript:void(0)"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
          <li class="nav-item" data-visible-roles="portal_admin,admin"><a class="nav-link" href="/ui/portal/cps.html"><i class="bi bi-diagram-3"></i> Laddare</a></li>
          <li class="nav-item" data-visible-roles="portal_admin,admin"><a class="nav-link" href="/ui/orgs.html"><i class="bi bi-building-gear"></i> Organisationer</a></li>
          <li class="nav-item"><a href="#" class="nav-link" data-route-portal="/ui/portal/add_user.html" data-route-org="/ui/org/add_user.html" data-route-user="/ui/user/index.html"><i class="bi bi-person-plus"></i> Lägg till användare</a></li>
          <li class="nav-item"><a href="#" class="nav-link" data-route-portal="/ui/users.html" data-route-org="/ui/org/users.html" data-route-user="/ui/user/index.html"><i class="bi bi-people"></i> Användare</a></li>
          <li class="nav-item"><a href="#" class="nav-link" data-route-portal="/ui/users_history.html" data-route-org="/ui/org/history.html" data-route-user="/ui/user/index.html"><i class="bi bi-clock-history"></i> Historik</a></li>
          <li class="nav-item"><a href="#" class="nav-link" data-route-portal="/ui/my.html" data-route-org="/ui/org/my.html" data-route-user="/ui/user/my.html"><i class="bi bi-person-badge"></i> Min statistik</a></li>

          <li class="nav-item"><span id="me-display" class="navbar-text small text-light opacity-75"></span></li>
          <li class="nav-item"><button id="btnLogout" class="btn btn-outline-light btn-sm" type="button"><i class="bi bi-box-arrow-right"></i> Logga ut</button></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container my-4">
    <div id="page-alerts"></div>
    <div id="toast-stack" aria-live="polite" aria-atomic="true"></div>

    <section class="mb-4">
      <div class="d-flex align-items-center justify-content-between">
        <h1 class="h4 m-0" id="title">Hej!</h1>
        <div class="input-group" style="max-width: 260px;">
          <span class="input-group-text">Dagar</span>
          <input id="days" type="number" min="1" max="365" class="form-control" value="30">
          <button id="btnRefresh" class="btn btn-outline-secondary" type="button"><i class="bi bi-arrow-clockwise"></i></button>
        </div>
      </div>
      <p class="text-muted mb-0">Översikt över dina laddsessioner.</p>
    </section>

    <section class="row g-3">
      <div class="col-12 col-md-4">
        <div class="card border-0 shadow-sm h-100"><div class="card-body">
          <h5 class="card-title d-flex align-items-center gap-2"><i class="bi bi-lightning-charge"></i> Energi</h5>
          <div class="display-6" id="stat-kwh">–</div><div class="text-muted">kWh under perioden</div>
        </div></div>
      </div>
      <div class="col-12 col-md-4">
        <div class="card border-0 shadow-sm h-100"><div class="card-body">
          <h5 class="card-title d-flex align-items-center gap-2"><i class="bi bi-hash"></i> Sessioner</h5>
          <div class="display-6" id="stat-sessions">–</div><div class="text-muted">antal under perioden</div>
        </div></div>
      </div>
      <div class="col-12 col-md-4">
        <div class="card border-0 shadow-sm h-100"><div class="card-body">
          <h5 class="card-title d-flex align-items-center gap-2"><i class="bi bi-calendar2"></i> Period</h5>
          <div class="display-6" id="stat-days">–</div><div class="text-muted">dagar</div>
        </div></div>
      </div>
    </section>

    <div class="mt-4">
      <a href="javascript:void(0)" class="js-go-dashboard">← Tillbaka till dashboard</a>
    </div>
  </main>

  <footer class="text-center text-muted small py-3"></footer>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/ui-common.js"></script>
  <script src="/assets/my.js?v=3"></script>
</body>
</html>
