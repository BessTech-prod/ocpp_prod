version: '3.8'

services:
  redis-service:
    image: redis:7-alpine
    container_name: redis-service
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-defaultpassword}
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  ocpp-ws-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.ocpp_ws
    container_name: ocpp-ws-service
    ports:
      - "9000:9000"
    environment:
      - REDIS_URL=redis://:defaultpassword@redis-service:6379/0
      - OCPP_PORT=9000
    depends_on:
      redis-service:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('localhost', 9000)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3

  api-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: api-service
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://:defaultpassword@redis-service:6379/0
      - API_PORT=8000
      - APP_SECRET=${APP_SECRET:-dev-secret-change-me}
    depends_on:
      redis-service:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ui-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.ui
    container_name: ui-service
    ports:
      - "80:80"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:

networks:
  internal:
    driver: bridge
